<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Wordle Helper</title>
</head>
<body>
    <h1>Wordle Helper</h1>
    <div class="row">
        <div class="column">
            <div class="input">
                <div class="greenPos">
                    <h2>Letters in correct position</h2>
                </div>
                <div class="yellowPos">
                    <h2>Letters in wrong position</h2>
                </div>
                <div class="grayPos">
                    <h2>Letters not in the word</h2>
                </div>
                <div class="defaultPos">
                    <button id="clearButton">Clear Inputs</button>
                </div>
            </div>
        </div>
        <div class="column">
            <div class="output">
                <div class="results">
                    <h2>Possible words</h2>
                    <ul id="possibleWords"></ul>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
