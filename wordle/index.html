<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Wordle Helper</title>
</head>
<body>
    <h1>Wordle Helper</h1>
    <div class="row">
        <div class="columnLeft">
            <h2>Input Grid</h2>
            <div id="wordle-grid"></div>
            <div class="controls">
                <button id="clearButton">Reset Grid</button>
                <p class="instruction">Click a square to change color: <br> 
                    <span class="square-ref black"></span> Ignored 
                    <span class="square-ref gray"></span> Absent 
                    <span class="square-ref green"></span> Correct 
                    <span class="square-ref yellow"></span> Present
                </p>
            </div>
        </div>
        <div class="columnRight">
            <div class="output">
                <h2>Possible Words</h2>
                <ul id="possibleWords"></ul>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
